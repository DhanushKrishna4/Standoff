# Render blueprint — one-click deploy of the whole app (static + live rooms).
# Zero dependencies, so no build step; Render just runs the Node server, which
# serves index.html and the RFC 6455 WebSocket rooms from the same origin.
# Deploy: push to GitHub, then New → Blueprint on render.com and pick this repo.
# (For Fly.io / Railway / Cloud Run, use the included Dockerfile instead.)
services:
  - type: web
    name: standoff
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
    # Free tier has an ephemeral disk, so room ledgers + accounts reset on each
    # redeploy. To persist them, switch `plan` to `starter` and uncomment below —
    # the server writes to $DATA_DIR when set (see server.js).
    #   - key: DATA_DIR
    #     value: /data
    # disk:
    #   name: standoff-data
    #   mountPath: /data
    #   sizeGB: 1
